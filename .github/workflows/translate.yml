
name: Google Drive Auto Translator

on:
  schedule:
    - cron: '*/30 * * * *'  # 每 30 分钟自动运行一次
  workflow_dispatch:       # 支持手动点击按钮运行

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install PyDrive2 googletrans==4.0.0-rc1

      - name: Start Translation
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: python translate_sync.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 拉取最新代码防止冲突
          git pull origin main 
          # 只要是新生成的 CHAPTER 文件都添加
          git add CHAPTER_*.txt PREFACE.txt || echo "No files to add"
          git commit -m "Add translated chapters" || echo "No changes to commit"
          git push
