
name: Google Drive Auto Translator

on:
  schedule:
    - cron: '*/30 * * * *'  # 每 30 分钟自动运行一次
  workflow_dispatch:       # 支持手动点击按钮运行

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install PyDrive2 googletrans==4.0.0-rc1

      - name: Start Translation
        env:
          GDRIVE_JSON: ${{ secrets.GDRIVE_JSON }}
        run: python translate_sync.py
